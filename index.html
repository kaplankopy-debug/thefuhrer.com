<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Home</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      display: block;
      background: #000;
    }

    /* Desktop: fill screen nicely */
    @media (min-width: 769px) {
      video {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
    }

    /* Mobile: show full width of the video */
    @media (max-width: 768px) {
      .video-wrap {
        align-items: center;
        justify-content: center;
      }

      video {
        width: 100vw;
        height: auto;
        max-height: 100vh;
        object-fit: contain;
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,0.18);
      z-index: 10;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cta {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .cta:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video
      id="bgVideo"
      playsinline
      webkit-playsinline
      autoplay
      muted
      loop
      preload="auto"
    >
      <source src="homepage-video.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div id="overlay" class="overlay">
    <button id="soundButton" class="cta" type="button">Tap to play with sound</button>
  </div>

  <script>
    const video = document.getElementById("bgVideo");
    const overlay = document.getElementById("overlay");
    const soundButton = document.getElementById("soundButton");

    async function startMuted() {
      try {
        video.muted = true;
        await video.play();
      } catch (e) {
        console.log("Muted autoplay blocked", e);
      }
    }

    async function enableSound() {
      try {
        video.muted = false;
        video.volume = 1;
        await video.play();
        overlay.classList.add("hidden");
      } catch (e) {
        console.log("Sound start blocked", e);
      }
    }

    startMuted();

    window.addEventListener("load", async () => {
      try {
        video.muted = false;
        video.volume = 1;
        await video.play();
        overlay.classList.add("hidden");
      } catch (e) {
        overlay.classList.remove("hidden");
      }
    });

    soundButton.addEventListener("click", enableSound);
    overlay.addEventListener("click", (e) => {
      if (e.target !== soundButton) enableSound();
    });
  </script>
</body>
</html>
