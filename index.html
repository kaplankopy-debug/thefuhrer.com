<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: #000;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills screen without distortion */
      display: block;
    }
  </style>
</head>
<body>
  <img src="your-image.jpg" alt="Full Screen Image">
</body>
</html>
