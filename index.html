<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>thefuhrer.com</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      background: #000;
    }

    @media (max-width: 768px) {
      video {
        width: 100vw;
        height: auto;
        max-height: 100vh;
      }
    }

    .sound-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 999px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .sound-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .tap-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.18);
      color: white;
      font-size: 16px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      padding: 24px;
    }

    .tap-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video
      id="bgVideo"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source src="your-video.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div id="tapOverlay" class="tap-overlay hidden">
    Tap anywhere for sound
  </div>

  <button id="soundBtn" class="sound-btn">Unmute</button>

  <script>
    const video = document.getElementById("bgVideo");
    const soundBtn = document.getElementById("soundBtn");
    const tapOverlay = document.getElementById("tapOverlay");

    async function tryAutoplay() {
      try {
        await video.play();
      } catch (err) {
        tapOverlay.classList.remove("hidden");
      }
    }

    tryAutoplay();

    soundBtn.addEventListener("click", async () => {
      try {
        video.muted = !video.muted;
        await video.play();
        soundBtn.textContent = video.muted ? "Unmute" : "Mute";
        if (!video.muted) {
          tapOverlay.classList.add("hidden");
        }
      } catch (err) {
        tapOverlay.classList.remove("hidden");
      }
    });

    tapOverlay.addEventListener("click", async () => {
      try {
        video.muted = false;
        await video.play();
        soundBtn.textContent = "Mute";
        tapOverlay.classList.add("hidden");
      } catch (err) {
        console.error("Playback with sound failed:", err);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        video.play().catch(() => {});
      }
    });
  </script>
</body>
</html>
