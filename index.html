<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Academic Index</title>
  <style>
    :root {
      --bg: #fffbe6; /* faint yellow */
      --text: #111;
      --muted: #666;
      --link: #0b2e7a;
      --link-visited: #4b2a7a;
      --border: rgba(0,0,0,0.12);
    }
    html, body { height: 100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: "Times New Roman", Times, serif;
      font-size: 12px;
      line-height: 1.35;
    }
    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }
    header{
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    h1{
      margin: 0 0 6px 0;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.2px;
    }
    .sub{
      margin:0;
      color: var(--muted);
    }
    .toolbar{
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="search"]{
      font-family: inherit;
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      width: min(520px, 100%);
      outline: none;
    }
    .count{
      color: var(--muted);
    }
    .grid{
      margin-top: 16px;
      columns: 2;
      column-gap: 34px;
    }
    @media (max-width: 820px){
      .grid{ columns: 1; }
    }
    ol{
      margin: 0;
      padding-left: 20px;
    }
    li{
      break-inside: avoid;
      padding: 2px 0;
      border-bottom: 1px dotted rgba(0,0,0,0.08);
    }
    a{
      color: var(--link);
      text-decoration: none;
    }
    a:hover{ text-decoration: underline; }
    a:visited{ color: var(--link-visited); }
    .meta{
      color: var(--muted);
      margin-left: 6px;
      font-size: 11px;
    }
    footer{
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
    code{ font-size: 11px; }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Academic Index</h1>
      <p class="sub">A compact, citation-like index of links (generated list of 500 entries).</p>
      <div class="toolbar">
        <input id="q" type="search" placeholder="Filter by title or tag (e.g., archive, biography, pdf)..." />
        <span class="count" id="count"></span>
      </div>
    </header>

    <div class="grid">
      <ol id="list"></ol>
    </div>

    <footer>
      <div>Tip: replace placeholder URLs/titles by editing the generator at the bottom of this file.</div>
      <div>Format: <code>Title</code> — <code>tag</code> — <code>https://example.com</code></div>
    </footer>
  </div>

  <script>
    // --- EDIT THIS SECTION ONLY ---
    // You can replace the placeholder URL pattern with real sources later.
    // Example: return `https://example.com/source/${i}`

    function makeEntry(i){
      const topics = [
        "Archive", "Primary Source", "Bibliography", "Document", "Biography",
        "Museum", "Library", "Map", "Periodical", "Research Note",
        "Oral History", "Dataset", "Catalogue", "Finding Aid", "Timeline"
      ];
      const tags = [
        "archive", "primary", "secondary", "index", "catalogue",
        "pdf", "scan", "map", "journal", "reference"
      ];

      const topic = topics[(i - 1) % topics.length];
      const tag = tags[(i - 1) % tags.length];

      // Placeholder URL (safe for GitHub Pages). Replace with your real links.
      const url = `https://example.com/${String(i).padStart(3,"0")}`;

      // Academic-ish title style
      const title = `${topic} Entry ${String(i).padStart(3,"0")}`;

      return { title, tag, url };
    }

    const entries = Array.from({length: 500}, (_, idx) => makeEntry(idx + 1));
    // --- END EDIT SECTION ---

    const listEl = document.getElementById("list");
    const qEl = document.getElementById("q");
    const countEl = document.getElementById("count");

    function render(items){
      listEl.innerHTML = items.map(e => {
        const safeTitle = escapeHtml(e.title);
        const safeTag = escapeHtml(e.tag);
        const safeUrl = escapeHtml(e.url);
        return `
          <li>
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
            <span class="meta">— ${safeTag} — ${safeUrl}</span>
          </li>
        `;
      }).join("");
      countEl.textContent = `${items.length} / ${entries.length} shown`;
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    qEl.addEventListener("input", () => {
      const q = qEl.value.trim().toLowerCase();
      if(!q){ render(entries); return; }
      const filtered = entries.filter(e =>
        e.title.toLowerCase().includes(q) ||
        e.tag.toLowerCase().includes(q) ||
        e.url.toLowerCase().includes(q)
      );
      render(filtered);
    });

    render(entries);
  </script>
</body>
</html>
